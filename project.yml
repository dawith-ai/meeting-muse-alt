# xcodegen 프로젝트 정의 — `brew install xcodegen` 후 `xcodegen generate` 실행.
#
# 이 파일은 Xcode App Target 생성용입니다.
# 평소 개발은 `swift build` / `swift test` 로 진행하고, 배포 빌드만 Xcode 사용.
#
# 사용법:
#   brew install xcodegen      # 최초 1회
#   xcodegen generate          # MeetingMuseAlt.xcodeproj 생성
#   open MeetingMuseAlt.xcodeproj

name: MeetingMuseAlt
options:
  bundleIdPrefix: kr.dawith.meetingmuse
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: ko
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.9.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0

targets:
  MeetingMuseAlt:
    type: application
    platform: macOS
    sources:
      - path: Sources/MeetingMuseAlt
        excludes:
          - "**/.gitkeep"
    resources:
      - Sources/MeetingMuseAlt/Resources
    info:
      path: Sources/MeetingMuseAlt/Resources/Info.plist
      properties:
        CFBundleDisplayName: Meeting Muse Alt
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright © 2026 Dawith. All rights reserved."
        NSMicrophoneUsageDescription: "회의 녹음을 위해 마이크가 필요합니다."
        NSScreenCaptureUsageDescription: "Zoom/Meet/Teams 등의 시스템 오디오를 캡처하기 위해 화면 녹화 권한이 필요합니다."
        NSAppleEventsUsageDescription: "실행 중인 회의 앱을 자동 감지하기 위해 권한이 필요합니다."
        # Sparkle 자동 업데이트
        SUFeedURL: "https://raw.githubusercontent.com/dawith-ai/meeting-muse-alt/main/appcast.xml"
        SUEnableInstallerLauncherService: true
        SUEnableJavaScript: false
        SUScheduledCheckInterval: 86400 # 1일
        SUAutomaticallyUpdate: false
        # SUPublicEDKey 는 sparkle generate_keys 후 채워넣어야 함 (DEPLOYMENT.md 참조).
        # 비어 있어도 미서명 모드로 동작하지만 production 에서는 반드시 채워야 함.
        SUPublicEDKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.dawith.meetingmuse.alt
        CODE_SIGN_ENTITLEMENTS: Sources/MeetingMuseAlt/Resources/MeetingMuseAlt.entitlements
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: Sparkle
        product: Sparkle

  MeetingMuseAltTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/MeetingMuseAltTests
    dependencies:
      - target: MeetingMuseAlt
